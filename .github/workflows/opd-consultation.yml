name: OPD Consultation

# Runs on:
#    so the app repo must explicitly notify this one - see project setup notes)
#  - manual workflow_dispatch
on:
  push:
    branches: [master, main]
  repository_dispatch:
    types: [app-master-push]
  workflow_dispatch:

env:
  CI: true

jobs:
  opd-consultation-fill-form:
    runs-on: ubuntu-latest

    env:
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18.18.2
          cache: npm

      - run: npm ci

      - name: Run OPD Consultation Fill Form test
        run: npm run cy:ui:opd-consultation

      - name: Generate UI Report
        if: always()
        run: npm run report:ui

      - name: Upload UI Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opd-consultation-report
          path: cypress/reports/ui/final
